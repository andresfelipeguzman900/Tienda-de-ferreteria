<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Super Herramientas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff5eb;
}

header {
    background: linear-gradient(90deg, #ff6600, #ff3300);
    color: white;
    text-align: center;
    padding: 30px;
}

header h1 {
    margin: 0;
    font-size: 40px;
}

header p {
    font-size: 18px;
}

.contenedor {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 30px;
}

.producto {
    background: white;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    text-align: center;
    padding: 15px;
    transition: transform 0.3s;
}

.producto:hover {
    transform: scale(1.05);
}

.producto img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.producto h3 {
    margin: 10px 0;
}

.precio {
    color: green;
    font-size: 20px;
    font-weight: bold;
}

button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #cc5200;
}
</style>

</head>

<body>

<header>
    <h1>🔧 Super Herramientas</h1>
    <p>Todo para tu moto, carro y construcción</p>
</header>

<div class="contenedor">

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/tools-1866839_1280.jpg">
        <h3>Kit Profesional para Moto</h3>
        <p class="precio">$120.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2017/08/06/00/36/tools-2588794_1280.jpg">
        <h3>Kit Completo para Carro</h3>
        <p class="precio">$180.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2016/03/27/21/16/drill-1280037_1280.jpg">
        <h3>Taladro Eléctrico Industrial</h3>
        <p class="precio">$250.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2015/07/02/10/22/toolbox-828593_1280.jpg">
        <h3>Caja de Herramientas Premium</h3>
        <p class="precio">$300.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2016/11/18/16/49/wrenches-1838961_1280.jpg">
        <h3>Juego de Llaves Profesionales</h3>
        <p class="precio">$90.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://cdn.pixabay.com/photo/2017/06/26/23/47/hammer-2448859_1280.jpg">
        <h3>Martillo de Construcción</h3>
        <p class="precio">$45.000</p>
        <button>Comprar</button>
    </div>

</div>

</body>
</html>
