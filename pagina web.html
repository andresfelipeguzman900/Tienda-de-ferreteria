<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda de Herramientas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .producto {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 15px;
            text-align: center;
        }

        .producto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .precio {
            color: green;
            font-weight: bold;
            font-size: 18px;
        }

        button {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #cc5200;
        }
    </style>
</head>
<body>

<header>
    <h1>🔧 Mi Tienda de Herramientas</h1>
    <p>Herramientas para motos, carros y construcción</p>
</header>

<div class="contenedor">

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1581091870627-3c5a3b5b1c1c" alt="Kit herramientas moto">
        <h3>Kit de Herramientas para Moto</h3>
        <p class="precio">$120.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1602526217033-2a3c2a9b5e2f" alt="Herramientas carro">
        <h3>Kit de Herramientas para Carro</h3>
        <p class="precio">$180.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1581579185169-7a1a4b2c1c5f" alt="Taladro">
        <h3>Taladro Eléctrico</h3>
        <p class="precio">$250.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62" alt="Caja herramientas">
        <h3>Caja de Herramientas Completa</h3>
        <p class="precio">$300.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1565120130286-5a0c39a2c9d1" alt="Llaves">
        <h3>Juego de Llaves</h3>
        <p class="precio">$90.000</p>
        <button>Comprar</button>
    </div>

    <div class="producto">
        <img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc" alt="Martillo">
        <h3>Martillo Profesional</h3>
        <p class="precio">$45.000</p>
        <button>Comprar</button>
    </div>

</div>

</body>
</html>
